<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Счастья, Ирина!</title>

  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== Сброс и базовые стили ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      /* Анимированный пастельный градиент */
      background: linear-gradient(-45deg,
        #f8d9e0, /* нежно-розовый */
        #fce4d6, /* персиковый */
        #fef5e0, /* ванильный */
        #e8dff5, /* лавандовый */
        #d5f0e8, /* мятный */
        #fce4d6  /* персиковый */
      );
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
    }

    /* Плавная анимация градиента фона */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 50% 100%; }
      50%  { background-position: 100% 50%; }
      75%  { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== Контейнер-карточка ===== */
    .card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 44px 36px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.06),
        0 2px 8px rgba(0, 0, 0, 0.04);
      position: relative;
      overflow: visible;
    }

    /* ===== Парящее солнце — светло-оранжевое, увеличенное ===== */
    .sun {
      font-size: 80px;
      line-height: 1;
      display: block;
      margin: 0 auto 12px;
      animation: floatSun 4s ease-in-out infinite;
      /* Окрашиваем эмодзи в светло-оранжевый через text-shadow + filter */
      filter: drop-shadow(0 0 18px rgba(255, 180, 80, 0.5));
      color: #FFB347;
      /* Для браузеров, поддерживающих перекраску эмодзи */
      text-shadow: 0 0 20px rgba(255, 180, 80, 0.4);
    }

    @keyframes floatSun {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* ===== Поздравление под солнцем ===== */
    .greeting {
      font-size: 17px;
      font-weight: 500;
      color: #c0784a;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ===== Заголовок «Слова о тебе» — светло-красный ===== */
    .title {
      font-size: 26px;
      font-weight: 700;
      color: #e07070;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    /* ===== Подзаголовок «Нажми на кнопку ниже» — тёплый коричневый ===== */
    .subtitle {
      font-size: 15px;
      font-weight: 400;
      color: #8b6f5c;
      margin-bottom: 32px;
    }

    /* ===== Кнопка — светло-синий анимированный градиент ===== */
    .btn {
      display: inline-block;
      padding: 16px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      /* Светло-синий анимированный градиент */
      background: linear-gradient(-45deg,
        #a8d8f0,
        #7ec8e3,
        #b8d4e8,
        #93c5e3,
        #a0d2f0,
        #8dbce6
      );
      background-size: 300% 300%;
      animation: btnGradient 8s ease infinite;
      box-shadow:
        0 6px 24px rgba(126, 200, 227, 0.35),
        0 2px 8px rgba(126, 200, 227, 0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      letter-spacing: 0.3px;
    }

    @keyframes btnGradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 10px 32px rgba(126, 200, 227, 0.45),
        0 4px 12px rgba(126, 200, 227, 0.3);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* ===== Блок с фразой ===== */
    .phrase-container {
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      position: relative;
    }

    .phrase-text {
      font-size: 19px;
      font-weight: 500;
      /* Спокойный зелёный цвет */
      color: #5a9a6e;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      padding: 0 8px;
    }

    .phrase-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Декоративные кавычки */
    .phrase-text::before {
      content: '«';
      color: #a3d4ab;
      font-weight: 300;
    }

    .phrase-text::after {
      content: '»';
      color: #a3d4ab;
      font-weight: 300;
    }

    /* ===== Музыкальный блок ===== */
    .music-section {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .music-label {
      font-size: 18px;
      font-weight: 500;
      color: #3cb955;
      letter-spacing: 0.3px;
    }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(-45deg, #f8d9e0, #fce4d6, #e8dff5, #d5f0e8);
      background-size: 300% 300%;
      animation: btnGradient 8s ease infinite;
      box-shadow:
        0 4px 16px rgba(200, 160, 140, 0.25),
        0 2px 6px rgba(200, 160, 140, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
    }

    .play-btn:hover {
      transform: scale(1.08);
      box-shadow:
        0 6px 22px rgba(200, 160, 140, 0.35),
        0 3px 10px rgba(200, 160, 140, 0.2);
    }

    .play-btn:active {
      transform: scale(0.96);
    }

    /* Иконка play (треугольник) */
    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 10px 0 10px 18px;
      border-color: transparent transparent transparent #e07070;
      margin-left: 3px;
      transition: opacity 0.2s ease;
    }

    /* Иконка pause (две полоски) */
    .pause-icon {
      display: none;
      gap: 4px;
    }

    .pause-icon span {
      display: block;
      width: 5px;
      height: 20px;
      background: #e07070;
      border-radius: 2px;
    }

    .play-btn.playing .play-icon {
      display: none;
    }

    .play-btn.playing .pause-icon {
      display: flex;
    }

    /* Пульсирующее кольцо при воспроизведении */
    .play-btn.playing::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #e8a0a0;
      animation: ringPulse 1.8s ease-out infinite;
    }

    @keyframes ringPulse {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* ===== Подпись внизу ===== */
    .footer {
      margin-top: 28px;
      font-size: 15px;
      color: #3cb955;
      font-weight: 400;
    }

    .footer .heart {
      display: inline-block;
      color: #f62213;
      animation: pulse 1.8s ease-in-out infinite;
      font-size: 16px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.25); }
    }

    /* ===== Декоративные частицы при клике ===== */
    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      opacity: 0;
      animation: particleFloat 2.5s ease-out forwards;
      z-index: 100;
    }

    @keyframes particleFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
    }

    /* ===== Сердечки, летящие вверх двумя рядами ===== */
    .flying-heart {
      position: fixed;
      pointer-events: none;
      font-size: 22px;
      color: #e06060;
      opacity: 0;
      z-index: 90;
      animation: heartFlyUp 3.5s ease-out forwards;
    }

    @keyframes heartFlyUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5);
      }
      10% {
        opacity: 0.9;
        transform: translateY(-20px) scale(1);
      }
      70% {
        opacity: 0.7;
      }
      100% {
        opacity: 0;
        transform: translateY(-110vh) scale(0.6);
      }
    }

    /* ===== Адаптивность ===== */
    @media (max-width: 600px) {
      .card {
        padding: 32px 22px 30px;
        border-radius: 22px;
      }

      .sun {
        font-size: 64px;
      }

      .greeting {
        font-size: 15px;
      }

      .title {
        font-size: 21px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 24px;
      }

      .btn {
        padding: 14px 28px;
        font-size: 15px;
      }

      .phrase-text {
        font-size: 17px;
      }
    }

    @media (max-width: 380px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 24px 16px 24px;
      }

      .sun {
        font-size: 52px;
      }

      .title {
        font-size: 19px;
      }

      .phrase-text {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="card" id="card">

    <!-- Парящее солнце — светло-оранжевое, увеличенное -->
    <span class="sun" role="img" aria-label="солнышко">&#x2600;</span>

    <!-- Поздравление под солнцем -->
    <p class="greeting">Ирина, поздравляю тебя<br>с Международным Днём Счастья!</p>

    <!-- Заголовок — светло-красный -->
    <h1 class="title">Слова о тебе</h1>

    <!-- Подзаголовок — тёплый коричневый -->
    <p class="subtitle">Нажми на кнопку ниже</p>

    <!-- Кнопка — светло-синий градиент -->
    <button class="btn" id="btn" onclick="showPhrase()">
      Получить повод для улыбки
    </button>

    <!-- Блок для фразы -->
    <div class="phrase-container" id="phraseContainer">
      <p class="phrase-text" id="phraseText"></p>
    </div>

    <!-- Музыкальный блок -->
    <div class="music-section">
      <span class="music-label">Тоже о тебе</span>
      <button class="play-btn" id="playBtn" onclick="toggleMusic()">
        <div class="play-icon"></div>
        <div class="pause-icon"><span></span><span></span></div>
      </button>
      <!-- Аудио: файл music.mp3 лежит рядом с index.html -->
      <audio id="bgMusic" src="music.mp3" preload="auto"></audio>
    </div>

    <!-- Подпись -->
    <div class="footer">
      с любовью, Артём <span class="heart">&#10084;</span>
    </div>

  </div>

  <script>
    /* ===== Массив из 15 тёплых фраз ===== */
    const phrases = [
      "С Международным днем счастья!",
      "Я очень ценю твою заботу и поддержку.",
      "Ты справляешься лучше, чем тебе кажется.",
      "С меня долгий расслабляющий массаж при встрече.",
      "Просто выдохни. Ты умница.",
      "Я рад, что мы на одной волне.",
      "Пусть этот день принесёт больше радости, чем обычно.",
      "Ты несравнима, ведь ты любима.",
      "Ты красива не только внешне, но и внутренне.",
      "Ирина, ты умная и мудрая.",
      "Твоя непосредственность и спонтанность притягивает.",
      "Спасибо за то, что ты есть.",
      "Твоя жизнь будет становиться только лучше и интереснее.",
      "Свет очей безусловный невидимый с тобою всегда.",
      "Ты совершенна и потенциал твой безграничный."
    ];

    /* ===== Логика «все 15 без повторов, затем заново» ===== */
    let remainingPhrases = []; // Очередь ещё не показанных фраз
    let lastShown = null;     // Последняя показанная фраза (для 100% без повторов на стыке циклов)

    /**
     * Перемешивание массива (алгоритм Фишера — Йетса)
     */
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /**
     * Пополнить очередь: перемешиваем все 15 фраз.
     * Если первая в новой очереди совпадает с последней показанной — сдвигаем её в конец.
     */
    function refillQueue() {
      remainingPhrases = shuffle(phrases);
      if (lastShown !== null && remainingPhrases[0] === lastShown) {
        remainingPhrases.push(remainingPhrases.shift());
      }
    }

    /**
     * Получить следующую фразу из очереди
     */
    function getNextPhrase() {
      if (remainingPhrases.length === 0) {
        refillQueue();
      }
      const phrase = remainingPhrases.shift();
      lastShown = phrase;
      return phrase;
    }

    /* ===== Основная функция показа фразы ===== */
    const phraseText = document.getElementById('phraseText');
    const phraseContainer = document.getElementById('phraseContainer');

    function showPhrase() {
      // Скрываем текущий текст
      phraseText.classList.remove('visible');

      // Ждём завершения fade-out, потом вставляем новую фразу
      setTimeout(() => {
        phraseText.textContent = getNextPhrase();
        phraseText.classList.add('visible');

        // Запускаем декоративные частицы
        spawnParticles();

        // Запускаем сердечки, летящие вверх в 2 ряда
        spawnFlyingHearts();
      }, 300);
    }

    /* ===== Декоративные частицы (✦ ♡ ✧) ===== */
    function spawnParticles() {
      const symbols = ['✦', '♡', '✧', '❋', '✿'];
      const btn = document.getElementById('btn');
      const rect = btn.getBoundingClientRect();

      for (let i = 0; i < 6; i++) {
        const particle = document.createElement('span');
        particle.className = 'particle';
        particle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        particle.style.left = (rect.left + Math.random() * rect.width) + 'px';
        particle.style.top = (rect.bottom + 5) + 'px';
        particle.style.color = ['#e8a0a0', '#a3d4ab', '#93c5e3', '#d4b8e8', '#f0c8a0'][Math.floor(Math.random() * 5)];
        document.body.appendChild(particle);

        // Удаляем частицу после анимации
        setTimeout(() => particle.remove(), 2500);
      }
    }

    /* ===== Сердечки, летящие вверх двумя вертикальными рядами ===== */
    function spawnFlyingHearts() {
      const container = document.getElementById('phraseContainer');
      const rect = container.getBoundingClientRect();

      // Центр фразы — от него два ряда: левый и правый
      const centerX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;

      // Два ряда: ~80px левее и ~80px правее центра
      const offsetX = Math.min(80, rect.width * 0.25);
      const columns = [centerX - offsetX, centerX + offsetX];

      const heartSymbols = ['♥', '❤', '♡'];

      columns.forEach((colX) => {
        // 5 сердечек на каждый ряд с задержкой
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const heart = document.createElement('span');
            heart.className = 'flying-heart';
            heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            // Небольшое случайное смещение по X для естественности
            const jitter = (Math.random() - 0.5) * 24;
            heart.style.left = (colX + jitter) + 'px';
            heart.style.top = startY + 'px';
            // Немного разный размер
            heart.style.fontSize = (18 + Math.random() * 10) + 'px';
            document.body.appendChild(heart);

            // Удаляем после анимации
            setTimeout(() => heart.remove(), 3600);
          }, i * 350); // Задержка между сердечками в ряду
        }
      });
    }
    /* ===== Управление музыкальным плеером ===== */
    const bgMusic = document.getElementById('bgMusic');
    const playBtn = document.getElementById('playBtn');

    function toggleMusic() {
      if (bgMusic.paused) {
        bgMusic.play().then(() => {
          playBtn.classList.add('playing');
        }).catch((e) => {
          console.log('Не удалось воспроизвести:', e.message);
        });
      } else {
        bgMusic.pause();
        playBtn.classList.remove('playing');
      }
    }

    // Когда песня заканчивается — сбрасываем кнопку в исходное состояние (без loop)
    bgMusic.addEventListener('ended', () => {
      playBtn.classList.remove('playing');
      bgMusic.currentTime = 0;
    });
  </script>
  
  <style>
  .flying-item {
    position: fixed;
    bottom: -60px;
    font-size: 28px;
    z-index: 9999;
    pointer-events: none;
    animation: flyUp linear forwards;
    opacity: 0.9;
  }

  @keyframes flyUp {
    0% {
      transform: translateY(0) rotate(0deg) scale(0.5);
      opacity: 0;
    }
    10% {
      opacity: 1;
      transform: translateY(-50px) rotate(15deg) scale(1);
    }
    50% {
      opacity: 0.9;
      transform: translateY(-40vh) rotate(-10deg) scale(1.1);
    }
    80% {
      opacity: 0.6;
    }
    100% {
      transform: translateY(-105vh) rotate(20deg) scale(0.8);
      opacity: 0;
    }
  }
</style>

<style>
  .flying-item {
    position: fixed;
    bottom: -60px;
    font-size: 28px;
    z-index: 9999;
    pointer-events: none;
    animation: flyUp linear forwards;
    opacity: 0.95;
    font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
  }

  @keyframes flyUp {
    0% {
      transform: translateY(0) rotate(0deg) scale(0.5);
      opacity: 0;
    }
    10% {
      opacity: 1;
      transform: translateY(-50px) rotate(15deg) scale(1);
    }
    50% {
      opacity: 0.95;
      transform: translateY(-40vh) rotate(-10deg) scale(1.1);
    }
    80% {
      opacity: 0.7;
    }
    100% {
      transform: translateY(-105vh) rotate(20deg) scale(0.8);
      opacity: 0;
    }
  }

  .fly-gold { color: #FFD700; }
  .fly-red { color: #FF3B5C; }
  .fly-purple { color: #A855F7; }
  .fly-blue { color: #38BDF8; }
</style>

<script>
(function() {
  const items = [
    { text: '●', color: 'fly-gold' },
    { text: '●', color: 'fly-red' },
    { text: '●', color: 'fly-purple' },
    { text: '●', color: 'fly-blue' },
    { text: '◆', color: 'fly-gold' },
    { text: '◆', color: 'fly-red' },
    { text: '◆', color: 'fly-purple' },
    { text: '◆', color: 'fly-blue' },
    { text: '★', color: 'fly-gold' },
    { text: '★', color: 'fly-red' },
    { text: '★', color: 'fly-purple' },
    { text: '✦', color: 'fly-gold' },
    { text: '✦', color: 'fly-blue' },
    { text: '♥', color: 'fly-red' },
    { text: '♥', color: 'fly-purple' },
    { text: '❖', color: 'fly-gold' },
    { text: '❖', color: 'fly-blue' },
    { text: '✿', color: 'fly-purple' },
    { text: '✿', color: 'fly-red' },
    { text: '♦', color: 'fly-gold' },
    { text: '♦', color: 'fly-red' }
  ];

  const columns = [35, 65];
  let flyInterval = null;

  function spawnItem() {
    const el = document.createElement('div');
    const item = items[Math.floor(Math.random() * items.length)];
    
    el.className = 'flying-item ' + item.color;
    el.textContent = item.text;

    const col = columns[Math.floor(Math.random() * columns.length)];
    const offset = (Math.random() - 0.5) * 10;
    el.style.left = (col + offset) + '%';

    const duration = 3 + Math.random() * 3;
    const size = 26 + Math.floor(Math.random() * 22);
    el.style.fontSize = size + 'px';
    el.style.animationDuration = duration + 's';

    document.body.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000);
  }

  function startFlying() {
    if (flyInterval) return;
    flyInterval = setInterval(() => {
      spawnItem();
      if (Math.random() > 0.5) spawnItem();
    }, 300);
  }

  function stopFlying() {
    clearInterval(flyInterval);
    flyInterval = null;
  }

  const audio = document.getElementById('bgMusic');
  audio.addEventListener('play', startFlying);
  audio.addEventListener('pause', stopFlying);
  audio.addEventListener('ended', stopFlying);
})();
</script>

</body>
</html>
